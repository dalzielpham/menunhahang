<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Thực đơn</title>
<meta name="description" content="Xem thực đơn các nhà hàng" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="/config.js"></script>
<style>
  :root{
    --bg:#FBF8F4; --ink:#221D1A; --muted:#7C7065;
    --card:#FFFFFF; --line:#EBE3D8; --accent:#C0392B;
    --shadow:0 1px 2px rgba(34,29,26,.04),0 12px 32px rgba(34,29,26,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{min-height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top) 20px env(safe-area-inset-bottom)}
  .wrap{width:100%;max-width:560px;margin:0 auto;flex:1;display:flex;flex-direction:column;justify-content:center;padding:48px 0}
  header{text-align:center;margin-bottom:36px}
  .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:14px}
  h1{font-family:Fraunces,Georgia,serif;font-weight:500;font-size:clamp(34px,9vw,48px);line-height:1.05;letter-spacing:-.01em}
  .tagline{color:var(--muted);margin-top:12px;font-size:15px}
  .list{display:flex;flex-direction:column;gap:14px}
  .card{display:block;text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);
    border-radius:18px;padding:22px 22px 20px;box-shadow:var(--shadow);
    transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
  .card:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(34,29,26,.05),0 18px 44px rgba(34,29,26,.1);border-color:#E0D6C7}
  .card:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  .card-top{display:flex;align-items:baseline;justify-content:space-between;gap:14px}
  .name{font-family:Fraunces,Georgia,serif;font-weight:500;font-size:24px;line-height:1.15}
  .desc{color:var(--muted);font-size:14px;margin-top:4px}
  .go{flex:none;font-size:13px;font-weight:600;color:var(--accent);display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .go svg{transition:transform .18s ease}
  .card:hover .go svg{transform:translateX(3px)}
  .foot-row{margin-top:16px;padding-top:14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}
  .foot-row svg{flex:none}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:24px 0 8px}
  .empty{text-align:center;color:var(--muted);background:var(--card);border:1px dashed var(--line);border-radius:18px;padding:40px 24px}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Thực đơn</div>
      <h1 id="brand">Nhà Hàng Của Tôi</h1>
      <p class="tagline" id="tagline"></p>
    </header>
    <main class="list" id="list"></main>
  </div>
  <footer id="footer"></footer>

<script>
(function(){
  var cfg = window.MENU_CONFIG || {};
  var accent = cfg.accentColor || "#C0392B";
  document.documentElement.style.setProperty('--accent', accent);
  document.getElementById('brand').textContent = cfg.brandName || "Thực đơn";
  var tl = document.getElementById('tagline');
  if (cfg.tagline) tl.textContent = cfg.tagline; else tl.style.display='none';
  document.getElementById('footer').textContent = "© " + new Date().getFullYear() + " " + (cfg.brandName || "");

  var arrow = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>';
  var phoneIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>';

  var list = document.getElementById('list');
  var items = (cfg.restaurants || []).filter(function(r){return r && r.id && r.pdf;});

  if (!items.length){
    list.innerHTML = '<div class="empty">Chưa có thực đơn nào. Hãy thêm nhà hàng trong file <b>config.js</b>.</div>';
    return;
  }

  items.forEach(function(r){
    var a = document.createElement('a');
    a.className = 'card';
    a.href = '/m/' + encodeURIComponent(r.id);
    var html = '<div class="card-top"><div>'
      + '<div class="name"></div>'
      + (r.description ? '<div class="desc"></div>' : '')
      + '</div><span class="go">Xem thực đơn ' + arrow + '</span></div>';
    if (r.phone){
      html += '<div class="foot-row">' + phoneIcon + '<span>Đặt bàn: ' + r.phone + '</span></div>';
    }
    a.innerHTML = html;
    a.querySelector('.name').textContent = r.name || r.id;
    if (r.description) a.querySelector('.desc').textContent = r.description;
    list.appendChild(a);
  });
})();
</script>
</body>
</html>
