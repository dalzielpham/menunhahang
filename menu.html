<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Thực đơn</title>
<script src="/config.js"></script>
<script src="/vendor/pdf.min.js"></script>
<script src="/vendor/page-flip.browser.js"></script>
<style>
  :root{ --accent:#C0392B; --bar:#1A1715; --bar-ink:#F4ECE2; --bar-muted:#A99C8D; }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:#23201D;color:#F4ECE2;font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;
       display:flex;flex-direction:column;overflow:hidden;height:100dvh}

  /* Thanh trên */
  .topbar{flex:none;display:flex;align-items:center;gap:12px;height:54px;padding:0 12px;
    padding-top:env(safe-area-inset-top);height:calc(54px + env(safe-area-inset-top));
    background:var(--bar);border-bottom:1px solid rgba(255,255,255,.06);z-index:5}
  .iconbtn{flex:none;width:40px;height:40px;border-radius:10px;border:none;background:transparent;color:var(--bar-ink);
    display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s}
  .iconbtn:hover{background:rgba(255,255,255,.08)}
  .iconbtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .title{flex:1;min-width:0;text-align:center;font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .title small{display:block;font-weight:400;font-size:11px;color:var(--bar-muted);margin-top:1px}

  /* Sân khấu sách */
  .stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;padding:10px}
  .book{margin:0 auto;touch-action:pan-y}
  .book .stf__item{box-shadow:0 10px 40px rgba(0,0,0,.45)}
  .page-img{width:100%;height:100%;display:block;object-fit:contain;background:#fff}

  /* Trạng thái tải / lỗi */
  .state{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:16px;padding:28px;background:#23201D}
  .spinner{width:38px;height:38px;border-radius:50%;border:3px solid rgba(255,255,255,.15);border-top-color:var(--accent);animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .state p{color:var(--bar-muted);font-size:14px;max-width:280px;line-height:1.5}
  .state .big{color:#F4ECE2;font-size:17px;font-weight:600}
  .homebtn{display:inline-block;margin-top:4px;text-decoration:none;color:#fff;background:var(--accent);
    padding:11px 20px;border-radius:11px;font-weight:600;font-size:14px}
  .hidden{display:none!important}

  /* Thanh dưới */
  .bottombar{flex:none;display:flex;align-items:center;gap:6px;
    height:calc(60px + env(safe-area-inset-bottom));
    padding:0 8px env(safe-area-inset-bottom);
    background:var(--bar);border-top:1px solid rgba(255,255,255,.06)}
  .bb-left{display:flex;align-items:center;gap:6px}
  .bb-center{flex:1;display:flex;align-items:center;justify-content:center;gap:8px}
  .bb-right{display:flex;align-items:center}
  .navbtn{width:44px;height:44px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);
    text-decoration:none;flex:none;
    color:var(--bar-ink);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
  .navbtn-mess{color:#0084FF;border-color:rgba(0,132,255,.35);background:rgba(0,132,255,.10)}
  .navbtn-mess:hover{background:rgba(0,132,255,.20)}
  .navbtn-call{color:#34C759;border-color:rgba(52,199,89,.35);background:rgba(52,199,89,.10)}
  .navbtn-call:hover{background:rgba(52,199,89,.20)}
  .navbtn:hover:not(:disabled){background:rgba(255,255,255,.12)}
  .navbtn:disabled{opacity:.3;cursor:default}
  .navbtn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .counter{min-width:74px;text-align:center;font-size:14px;font-weight:600;color:var(--bar-ink);font-variant-numeric:tabular-nums}
  .counter small{color:var(--bar-muted);font-weight:400}

  /* Phóng to (lightbox) */
  .zoom{position:fixed;inset:0;background:rgba(15,13,11,.96);z-index:50;display:none;flex-direction:column}
  .zoom.open{display:flex}
  .zoom-head{flex:none;display:flex;justify-content:flex-end;padding:env(safe-area-inset-top) 12px 8px}
  .zoom-scroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;display:flex;align-items:flex-start;justify-content:center}
  .zoom-scroll img{width:100%;max-width:1100px;height:auto;display:block}
  .zoom-hint{flex:none;text-align:center;color:var(--bar-muted);font-size:12px;padding:8px 0 calc(10px + env(safe-area-inset-bottom))}

  /* Chế độ cuộn (dự phòng) */
  .scrollview{position:absolute;inset:0;overflow:auto;-webkit-overflow-scrolling:touch;padding:14px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .scrollview img{width:100%;max-width:760px;height:auto;border-radius:6px;box-shadow:0 8px 30px rgba(0,0,0,.4);background:#fff}
</style>
</head>
<body>
  <div class="topbar">
    <a class="iconbtn" id="home" href="/" aria-label="Trang chủ" title="Trang chủ">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
    </a>
    <div class="title" id="title">Thực đơn<small id="subtitle"></small></div>
    <span class="iconbtn" aria-hidden="true" style="visibility:hidden"></span>
  </div>

  <div class="stage">
    <div class="book" id="book"></div>

    <div class="state" id="loading">
      <div class="spinner"></div>
      <p>Đang tải thực đơn…</p>
    </div>

    <div class="state hidden" id="error">
      <div class="big">Không tải được thực đơn</div>
      <p id="error-msg">Đường dẫn không hợp lệ hoặc file menu chưa tồn tại.</p>
      <a class="homebtn" href="/">Về trang chủ</a>
    </div>
  </div>

  <div class="bottombar" id="bottombar">
    <div class="bb-left">
      <a class="navbtn navbtn-mess hidden" id="mess" target="_blank" rel="noopener" aria-label="Nhắn Messenger" title="Nhắn tin Messenger">
        <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M0 7.76C0 3.301 3.493 0 8 0s8 3.301 8 7.76-3.493 7.76-8 7.76c-.81 0-1.586-.107-2.316-.307a.64.64 0 0 0-.427.03l-1.588.702a.64.64 0 0 1-.898-.566l-.044-1.423a.64.64 0 0 0-.215-.456C.956 12.108 0 10.092 0 7.76m5.546-1.459-2.35 3.728c-.225.358.214.761.551.506l2.525-1.916a.48.48 0 0 1 .578-.002l1.869 1.402a1.2 1.2 0 0 0 1.735-.32l2.35-3.728c.226-.358-.214-.761-.551-.506L9.728 7.381a.48.48 0 0 1-.578.002L7.281 5.98a1.2 1.2 0 0 0-1.735.32z"/></svg>
      </a>
      <a class="navbtn navbtn-call hidden" id="phone-btn" aria-label="Gọi điện" title="Gọi điện">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </a>
    </div>
    <div class="bb-center">
      <button class="navbtn" id="prev" aria-label="Trang trước">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6 6 6"/></svg>
      </button>
      <div class="counter"><span id="cur">–</span> <small>/ <span id="total">–</span></small></div>
      <button class="navbtn" id="next" aria-label="Trang sau">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg>
      </button>
    </div>
    <div class="bb-right">
      <button class="navbtn" id="zoom-btn" aria-label="Phóng to" title="Phóng to">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3M11 8v6M8 11h6"/></svg>
      </button>
    </div>
  </div>

  <!-- Lightbox phóng to -->
  <div class="zoom" id="zoom">
    <div class="zoom-head">
      <button class="iconbtn" id="zoom-close" aria-label="Đóng">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <div class="zoom-scroll"><img id="zoom-img" alt="Trang thực đơn phóng to" /></div>
    <div class="zoom-hint">Chụm 2 ngón tay để phóng to · cuộn để xem</div>
  </div>

<script>
(function(){
  "use strict";
  var cfg = window.MENU_CONFIG || {};
  document.documentElement.style.setProperty('--accent', cfg.accentColor || '#C0392B');

  // --- Xác định menu cần xem: ?id=... hoặc đường dẫn /m/<id> ---
  function resolveId(){
    var q = new URLSearchParams(location.search).get('id');
    if (q) return q;
    var parts = location.pathname.split('/').filter(Boolean);
    if (parts[0] === 'm' && parts[1]) return decodeURIComponent(parts[1]);
    return null;
  }
  var id = resolveId();
  var rest = (cfg.restaurants || []).filter(function(r){return r && r.id === id;})[0];

  var $ = function(s){return document.getElementById(s);};
  function showError(msg){
    $('loading').classList.add('hidden');
    $('book').classList.add('hidden');
    if (msg) $('error-msg').textContent = msg;
    $('error').classList.remove('hidden');
  }

  if (!rest){
    showError(id ? ('Không tìm thấy thực đơn "' + id + '".') : 'Thiếu mã thực đơn trong đường dẫn.');
    return;
  }

  document.title = (rest.name || 'Thực đơn');
  $('title').firstChild.textContent = rest.name || 'Thực đơn';
  if (cfg.brandName) $('subtitle').textContent = cfg.brandName;
  if (rest.phone){
    var ph = $('phone-btn');
    ph.href = 'tel:' + String(rest.phone).replace(/\s/g,'');
    ph.classList.remove('hidden');
  }
  if (rest.messenger){
    var ms = $('mess');
    var mUrl = String(rest.messenger).trim();
    if (!/^https?:\/\//i.test(mUrl)) mUrl = 'https://' + mUrl.replace(/^\/+/, '');
    ms.href = mUrl;
    ms.classList.remove('hidden');
  }

  var images = [];      // dataURL của từng trang
  var pageFlip = null;
  var ratio = 1.414;    // tỉ lệ cao/rộng (mặc định A4)
  var bookEl = $('book');

  // --- 1) Render PDF thành ảnh từng trang ---
  if (!window.pdfjsLib){ showError('Không tải được thư viện hiển thị. Kiểm tra kết nối mạng.'); return; }
  pdfjsLib.GlobalWorkerOptions.workerSrc = '/vendor/pdf.worker.min.js';

  pdfjsLib.getDocument({ url: rest.pdf }).promise.then(function(pdf){
    var tasks = [];
    for (var i = 1; i <= pdf.numPages; i++){ tasks.push(renderPage(pdf, i)); }
    return Promise.all(tasks);
  }).then(function(){
    if (!images.length){ showError('File thực đơn rỗng.'); return; }
    initFlipbook();
  }).catch(function(err){
    console.error(err);
    showError('Không mở được file PDF. Hãy kiểm tra lại đường dẫn trong config.js.');
  });

  function renderPage(pdf, num){
    return pdf.getPage(num).then(function(page){
      var base = page.getViewport({ scale: 1 });
      if (num === 1) ratio = base.height / base.width;
      var scale = Math.min(2.2, 1500 / base.width);   // độ nét vừa phải, không quá nặng
      var vp = page.getViewport({ scale: scale });
      var canvas = document.createElement('canvas');
      canvas.width = Math.ceil(vp.width); canvas.height = Math.ceil(vp.height);
      var ctx = canvas.getContext('2d');
      return page.render({ canvasContext: ctx, viewport: vp }).promise.then(function(){
        images[num-1] = canvas.toDataURL('image/jpeg', 0.9);
      });
    });
  }

  // --- 2) Khởi tạo flipbook (có dự phòng cuộn nếu lỗi) ---
  function initFlipbook(){
    try{
      if (!window.St || !St.PageFlip) throw new Error('PageFlip chưa sẵn sàng');
      pageFlip = new St.PageFlip(bookEl, {
        width: 480, height: Math.round(480*ratio),
        size: 'stretch',
        minWidth: 300, maxWidth: 2000,
        minHeight: 120, maxHeight: 2000,
        drawShadow: true, maxShadowOpacity: 0.4,
        showCover: false, usePortrait: true, autoSize: false,
        mobileScrollSupport: false, flippingTime: 650, swipeDistance: 18
      });
      pageFlip.loadFromImages(images);

      var total = pageFlip.getPageCount() || images.length;
      $('total').textContent = total;
      updateCounter(0);
      pageFlip.on('flip', function(e){ updateCounter(e.data); });

      $('prev').addEventListener('click', function(){ pageFlip.flipPrev(); });
      $('next').addEventListener('click', function(){ pageFlip.flipNext(); });
      bookEl.addEventListener('dblclick', openZoom);

      fitBook();
      window.addEventListener('resize', fitBook);
      window.addEventListener('orientationchange', function(){ setTimeout(fitBook, 250); });
      $('loading').classList.add('hidden');
    }catch(err){
      console.error('Flipbook lỗi, chuyển sang chế độ cuộn:', err);
      scrollFallback();
    }
  }

  function fitBook(){
    var stage = document.querySelector('.stage');
    var aw = stage.clientWidth - 20, ah = stage.clientHeight - 20;
    // Giữ chiều rộng dưới 2×minWidth (600) để page-flip luôn hiển thị 1 trang
    var w = Math.min(aw, ah / ratio, 560);
    if (w < 120) w = 120;
    bookEl.style.width = Math.floor(w) + 'px';
    bookEl.style.height = Math.floor(w * ratio) + 'px';
    if (pageFlip){ try{ pageFlip.update(); }catch(e){} }
  }

  function updateCounter(idx){
    var cur = (typeof idx === 'number' ? idx : 0) + 1;
    var total = images.length;
    $('cur').textContent = cur;
    $('prev').disabled = cur <= 1;
    $('next').disabled = cur >= total;
  }

  // --- Chế độ cuộn (nếu flipbook không chạy được) ---
  function scrollFallback(){
    $('loading').classList.add('hidden');
    bookEl.classList.add('hidden');
    $('bottombar').classList.add('hidden');
    var sv = document.createElement('div');
    sv.className = 'scrollview';
    images.forEach(function(src, i){
      var img = new Image();
      img.src = src; img.alt = 'Trang ' + (i+1);
      sv.appendChild(img);
    });
    document.querySelector('.stage').appendChild(sv);
  }

  // --- 3) Phóng to (lightbox) ---
  function currentIndex(){
    if (pageFlip){ try{ return pageFlip.getCurrentPageIndex() || 0; }catch(e){} }
    return 0;
  }
  function openZoom(){
    var i = currentIndex();
    $('zoom-img').src = images[i] || images[0];
    $('zoom').classList.add('open');
    document.querySelector('.zoom-scroll').scrollTop = 0;
  }
  function closeZoom(){ $('zoom').classList.remove('open'); }
  $('zoom-btn').addEventListener('click', openZoom);
  $('zoom-close').addEventListener('click', closeZoom);
  $('zoom').addEventListener('click', function(e){ if (e.target.id === 'zoom') closeZoom(); });

  // Phím mũi tên trên máy tính
  document.addEventListener('keydown', function(e){
    if (!pageFlip) return;
    if (e.key === 'ArrowLeft') pageFlip.flipPrev();
    else if (e.key === 'ArrowRight') pageFlip.flipNext();
    else if (e.key === 'Escape') closeZoom();
  });
})();
</script>
</body>
</html>
